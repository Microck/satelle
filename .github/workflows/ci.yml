name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  npm:
    name: npm distribution (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install minimum supported Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 18
          cache: npm

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9.15.9

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install npm test workspace
        run: npm ci --ignore-scripts

      - name: Install Facts CLI
        if: runner.os == 'Linux'
        run: npm install --global @avcodes/facts@0.6.0

      - name: Enforce executable CI facts
        if: runner.os == 'Linux'
        run: facts check --tags facts-policy

      - name: Check release metadata
        run: npm run release:check

      - name: Check npm distribution
        env:
          SATELLE_REQUIRED_PACKAGE_MANAGERS: npm,pnpm,bun
        run: npm run check:npm

  rust:
    name: Rust quality gates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3c0 # v7.0.0

      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets --all-features --locked --no-fail-fast

      - name: Build release binaries
        env:
          RUSTFLAGS: -D warnings
        run: cargo build --workspace --release --locked

      - name: Smoke-test release binary contracts
        run: cargo test --locked -p satelle-cli --test release-binary-contract release_binary_satisfies_offline_contract -- --exact --ignored

  # Fast merge gate: ubuntu-only Rust checks. Required for PR merge.
  # The full cross-platform matrix (above) runs but does not block merging.
  rust-merge-gate:
    name: Rust merge gate (ubuntu)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets --all-features --locked --no-fail-fast
